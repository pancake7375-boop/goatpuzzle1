<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Goat Riddle Game</title>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    overflow: hidden;
    color: white;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #4f8cff, #ff4f6d, #ffd36a);
  }

  .card {
    width: 90%;
    max-width: 500px;
    padding: 25px;
    border-radius: 25px;
    background: rgba(0,0,0,0.25);
    backdrop-filter: blur(10px);
    text-align: center;
  }

  input {
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: none;
    margin-top: 10px;
    font-size: 16px;
  }

  button {
    margin-top: 10px;
    padding: 12px 18px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    font-weight: bold;
  }

  .puzzle {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-top: 15px;
  }

  .tile {
    width: 80px;
    height: 80px;
    font-size: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255,255,255,0.2);
    border-radius: 15px;
    cursor: pointer;
  }

  canvas {
    position: fixed;
    top: 0;
    left: 0;
    pointer-events: none;
  }
</style>
</head>
<body>

<canvas id="confetti"></canvas>

<div class="card">
  <h1>🐐 Goat Challenge</h1>

  <div id="riddle">
    <p>Who’s the GOAT?</p>
    <input id="answer" placeholder="Type answer..." />
    <button onclick="check()">Submit</button>
  </div>

  <div id="puzzle" style="display:none;">
    <p>Arrange the goat!</p>
    <div class="puzzle">
      <div class="tile" onclick="swap(0)">🐐</div>
      <div class="tile" onclick="swap(1)">🐐</div>
      <div class="tile" onclick="swap(2)">🐐</div>
    </div>
  </div>

  <div id="done" style="display:none;">
    <h2>I LOVE YOU GOAT</h2>
    <div style="font-size:40px">💙 ❤️</div>
  </div>
</div>

<script>
let tiles = [0,1,2];
let solved = false;

function check(){
  const val = document.getElementById('answer').value.trim().toLowerCase();
  if(val === 'aiza'){
    document.getElementById('riddle').style.display = 'none';
    document.getElementById('puzzle').style.display = 'block';
  } else {
    alert('Wrong answer');
  }
}

function swap(i){
  const j = (i+1)%3;
  [tiles[i], tiles[j]] = [tiles[j], tiles[i]];
  render();
  checkWin();
}

function render(){
  const el = document.querySelectorAll('.tile');
  el.forEach((t,i)=>t.textContent='🐐');
}

function checkWin(){
  if(JSON.stringify(tiles)==='[0,1,2]'){
    document.getElementById('puzzle').style.display='none';
    document.getElementById('done').style.display='block';
    startConfetti();
  }
}

// simple confetti
const canvas = document.getElementById('confetti');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let pieces = [];
for(let i=0;i<80;i++){
  pieces.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    r: Math.random()*6+2,
    d: Math.random()*80
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = 'white';
  pieces.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fill();
  });
  update();
}

function update(){
  pieces.forEach(p=>{
    p.y += 2;
    if(p.y>canvas.height) p.y=0;
  });
}

function loop(){
  draw();
  requestAnimationFrame(loop);
}

function startConfetti(){
  loop();
}

loop();
</script>

</body>
</html>
